<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frontend Architecture Cards</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#ececec;
      padding:50px 20px;
    }

    h1{
      text-align:center;
      margin-bottom:60px;
      font-size:45px;
      font-weight:bold;
      color:#111;
    }

    .container{
      display:flex;
      justify-content:center;
      gap:40px;
      flex-wrap:wrap;
    }

    .card{
      width:260px;
      background:white;
      border-radius:20px;
      overflow:hidden;
      position:relative;
      text-align:center;
      box-shadow:0 15px 25px rgba(0,0,0,0.15);
      transition:0.5s;
    }

    .card:hover{
      transform:translateY(-10px);
    }

    /* Top Bar */

    .top{
      height:90px;
      position:relative;
      border-bottom-left-radius:25px;
      border-bottom-right-radius:25px;
    }

    /* Icon Circle */

    .icon{
      width:80px;
      height:80px;
      background:white;
      border-radius:50%;
      position:absolute;
      left:50%;
      bottom:-40px;
      transform:translateX(-50%);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:35px;
      box-shadow:0 8px 15px rgba(0,0,0,0.2);
    }

    /* Content */

    .content{
      padding:70px 25px 50px;
    }

    .number{
      font-size:55px;
      font-weight:bold;
      margin-bottom:20px;
    }

    .content p{
      font-size:20px;
      line-height:1.5;
      color:#222;
    }

    /* Bottom Circle */

    .bottom-circle{
      width:40px;
      height:40px;
      border-radius:50%;
      position:absolute;
      bottom:-20px;
      left:50%;
      transform:translateX(-50%);
      box-shadow:0 5px 10px rgba(0,0,0,0.2);
    }

    /* Card Colors */

    .orange .top{
      background:linear-gradient(to right,#ff9800,#ffb74d);
    }

    .orange .number,
    .orange .bottom-circle{
      color:#ff9800;
      background:#ff9800;
    }

    .purple .top{
      background:linear-gradient(to right,#7b1fff,#b44cff);
    }

    .purple .number,
    .purple .bottom-circle{
      color:#7b1fff;
      background:#7b1fff;
    }

    .blue .top{
      background:linear-gradient(to right,#00b0ff,#4fc3f7);
    }

    .blue .number,
    .blue .bottom-circle{
      color:#00b0ff;
      background:#00b0ff;
    }

    .pink .top{
      background:linear-gradient(to right,#ff3366,#ff668f);
    }

    .pink .number,
    .pink .bottom-circle{
      color:#ff3366;
      background:#ff3366;
    }

    /* Responsive */

    @media(max-width:768px){

      h1{
        font-size:32px;
      }

      .container{
        gap:25px;
      }

      .card{
        width:100%;
        max-width:320px;
      }

    }

  </style>
</head>

<body>

  <h1>Best practices of frontend architecture</h1>

  <div class="container">

    <!-- Card 1 -->

    <div class="card orange">

      <div class="top">
        <div class="icon">💡</div>
      </div>

      <div class="content">
        <div class="number">01</div>
        <p>Optimizing<br>the design</p>
      </div>

      <div class="bottom-circle"></div>

    </div>

    <!-- Card 2 -->

    <div class="card purple">

      <div class="top">
        <div class="icon">🖥️</div>
      </div>

      <div class="content">
        <div class="number">02</div>
        <p>Trendy frontend<br>CSS frameworks</p>
      </div>

      <div class="bottom-circle"></div>

    </div>

    <!-- Card 3 -->

    <div class="card blue">

      <div class="top">
        <div class="icon">🎨</div>
      </div>

      <div class="content">
        <div class="number">03</div>
        <p>Top-notch<br>interface design</p>
      </div>

      <div class="bottom-circle"></div>

    </div>

    <!-- Card 4 -->

    <div class="card pink">

      <div class="top">
        <div class="icon">📋</div>
      </div>

      <div class="content">
        <div class="number">04</div>
        <p>Actionable points<br>to improve<br>front-end architecture</p>
      </div>

      <div class="bottom-circle"></div>

    </div>

  </div>

</body>
</html>
