<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>CSS Transform Practice</title>
    <link rel="stylesheet" href="main.css"/>

</head>

<body>

    <h1>CSS Transform Practice</h1>

    <div class="container">

         <!-- 1 -->
        <div class="box move">
            <h2>1. Move Box</h2>
        </div>

        <!-- 2 -->
        <div class="box rotate">
            <h2>2. Rotate 45deg</h2>
        </div>

        <!-- 3 -->
        <div class="box zoom">
            <h2>3. Zoom Hover</h2>
        </div>

        <!-- 4 -->
        <div class="box skew">
            <h2>4. Skew Effect</h2>
        </div>

        <!-- 5 -->
        <div class="box combine">
            <h2>5. Combine Transform</h2>
        </div>

        <!-- 6 -->
        <div class="box image-box">
            <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1000" alt="">
        </div>

        <!-- 7 -->
        <div class="box">
            <button class="btn">Hover Me</button>
        </div>

        <!-- 8 -->
        <div class="box card">
            <h2>8. Card Rotate</h2>
        </div>

        <!-- 9 -->
        <div class="box scalex">
            <h2>9. scaleX Test</h2>
        </div>

        <!-- 10 -->
        <div class="box origin">
            <h2>10. Transform Origin</h2>
        </div>

    </div>

</body>
</html>
