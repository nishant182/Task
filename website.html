<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>School Website</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;

}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background-image:url('image/web.jpg');
    background-size:cover;
    background-position:center;
}

.card{
    width:350px;
    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(8px);
    border-radius:20px;
    padding:20px;
    text-align:center;
    color:white;
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
}


.card img{
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:15px;
    margin-bottom:15px;
}

.card h1{
    margin-bottom:10px;
    font-size:28px;
    color:#000000;
}

.card p{
    font-size:15px;
    margin-bottom:20px;
    color:#333333;
    font-family: 'italic', serif;
}


.btn{
    display:inline-block;
    padding:10px 20px;
    background:#ff9800;
    color:white;
    text-decoration:none;
    border-radius:8px;
    transition:0.3s;
}

.btn:hover{
    background:#e68900;
}
</style>
</head>

<body>

<div class="card">

    <img src="https://images.unsplash.com/photo-1580582932707-520aed937b7b" alt="School Image">

    <h1>My School</h1>

    <p>
        Welcome to our school website.  
        Here students can learn, grow and achieve success.
    </p>

    <a href="#" class="btn">Read More</a>

</div>

</body>
</html>
